<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rule-Based AI Chatbot</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #07111f;
      --panel: #ffffff;
      --panel-alt: #f5f7ff;
      --accent: #2563eb;
      --accent-2: #3b82f6;
      --text: #0f172a;
      --muted: #64748b;
      --user: #dbeafe;
      --bot: #e2e8f0;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(135deg, var(--bg), #1e3a8a);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: var(--text);
    }

    .app-shell {
      width: min(100%, 900px);
      background: rgba(255,255,255,0.95);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 25px 55px rgba(0,0,0,0.28);
      display: grid;
      grid-template-columns: 280px 1fr;
      min-height: 700px;
    }

    .sidebar {
      background: linear-gradient(180deg, #0f172a, #172554);
      color: white;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .brand {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .tagline {
      color: #cbd5e1;
      font-size: 14px;
      line-height: 1.6;
    }

    .quick-actions {
      display: grid;
      gap: 10px;
      margin-top: 8px;
    }

    .quick-btn {
      border: none;
      border-radius: 10px;
      padding: 10px 12px;
      text-align: left;
      cursor: pointer;
      background: rgba(255,255,255,0.12);
      color: white;
      font-size: 14px;
    }

    .main {
      display: flex;
      flex-direction: column;
      background: var(--panel);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 24px;
      border-bottom: 1px solid #e2e8f0;
      background: linear-gradient(90deg, #eff6ff, #f8fafc);
    }

    .title-group h1 {
      margin: 0;
      font-size: 20px;
    }

    .status {
      color: var(--muted);
      font-size: 13px;
      margin-top: 3px;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 18px 20px;
      background: var(--panel-alt);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      max-width: 78%;
      padding: 12px 14px;
      border-radius: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      box-shadow: 0 4px 12px rgba(15,23,42,0.06);
    }

    .msg.user {
      align-self: flex-end;
      background: var(--user);
      border-bottom-right-radius: 4px;
    }

    .msg.bot {
      align-self: flex-start;
      background: var(--bot);
      border-bottom-left-radius: 4px;
    }

    .msg.meta {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
      padding: 0 2px;
      background: transparent;
      box-shadow: none;
    }

    .input-area {
      padding: 16px 20px;
      border-top: 1px solid #e2e8f0;
      display: flex;
      gap: 12px;
      background: white;
    }

    input {
      flex: 1;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 15px;
      outline: none;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      color: white;
      cursor: pointer;
      font-weight: 600;
    }

    @media (max-width: 760px) {
      .app-shell { grid-template-columns: 1fr; min-height: auto; }
      .sidebar { display: none; }
      .messages { min-height: 420px; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">🤖 Chatbot Studio</div>
      <div class="tagline">A polished rule-based assistant with conversation history and a modern chat experience.</div>
      <div class="quick-actions">
        <button class="quick-btn" data-text="hi">Say hello</button>
        <button class="quick-btn" data-text="time">Check time</button>
        <button class="quick-btn" data-text="joke">Tell me a joke</button>
        <button class="quick-btn" data-text="help">Show help</button>
      </div>
    </aside>

    <section class="main">
      <div class="header">
        <div class="title-group">
          <h1>Rule-Based AI Chatbot</h1>
          <div class="status">Online • responses saved locally</div>
        </div>
      </div>
      <div class="messages" id="messages"></div>
      <div class="input-area">
        <input id="messageInput" type="text" placeholder="Type your message here..." />
        <button onclick="sendMessage()">Send</button>
      </div>
    </section>
  </div>

  <script>
    const messages = document.getElementById('messages');
    const input = document.getElementById('messageInput');

    function renderMessage(text, sender, time = '') {
      const bubble = document.createElement('div');
      bubble.className = `msg ${sender}`;
      bubble.innerHTML = `<div>${text}</div>${time ? `<div class="msg meta">${time}</div>` : ''}`;
      messages.appendChild(bubble);
      messages.scrollTop = messages.scrollHeight;
    }

    async function loadHistory() {
      try {
        const response = await fetch('/api/history');
        const data = await response.json();
        messages.innerHTML = '';
        if (data.messages.length === 0) {
          renderMessage('Hello! I can answer greetings, tell the time, share jokes, and more. Type help to see what I can do.', 'bot');
          return;
        }
        data.messages.forEach(item => renderMessage(item.message, item.sender, item.created_at));
      } catch (error) {
        renderMessage('Unable to load conversation history.', 'bot');
      }
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      renderMessage(text, 'user');
      input.value = '';

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });
        const data = await response.json();
        renderMessage(data.reply, 'bot');
      } catch (error) {
        renderMessage('Sorry, the server is unavailable.', 'bot');
      }
    }

    document.querySelectorAll('.quick-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        input.value = btn.dataset.text;
        input.focus();
      });
    });

    input.addEventListener('keydown', function (event) {
      if (event.key === 'Enter') {
        sendMessage();
      }
    });

    loadHistory();
  </script>
</body>
</html>
